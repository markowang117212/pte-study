<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3b5bdb">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>PTE Study — MARA 66/53/54/60/63</title>
<style>
:root{
  --bg:#f6f7fb; --card:#ffffff; --ink:#1c2333; --muted:#6b7280; --line:#e5e7eb;
  --brand:#3b5bdb; --brand2:#845ef7; --ok:#2f9e44; --warn:#e8590c; --bad:#c92a2a;
  --chip:#eef1ff;
}
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,Arial,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);font-size:15px}
header{position:sticky;top:0;z-index:10;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:6px;padding:8px 14px;flex-wrap:wrap}
header .logo{font-weight:800;color:var(--brand);margin-right:8px}
header nav{display:flex;gap:2px;flex-wrap:wrap}
header nav a{padding:7px 12px;border-radius:8px;text-decoration:none;color:var(--ink);font-weight:600}
header nav a.active,header nav a:hover{background:var(--chip);color:var(--brand)}
main{max-width:980px;margin:0 auto;padding:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
.card h2{margin:0 0 10px;font-size:17px}
.card h3{margin:14px 0 6px;font-size:15px}
.grid{display:grid;gap:10px}
.grid.cols3{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
.grid.cols2{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.muted{color:var(--muted)} .small{font-size:12.5px}
.btn{display:inline-block;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:9px;padding:8px 14px;font-size:14px;font-weight:600;cursor:pointer}
.btn:hover{border-color:var(--brand);color:var(--brand)}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.primary:hover{filter:brightness(1.08);color:#fff}
.btn.ghost{border:none;background:none;color:var(--brand)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.tag{display:inline-block;background:var(--chip);color:var(--brand);border-radius:6px;padding:2px 8px;font-size:12px;font-weight:700;margin-right:6px}
.tag.t0{background:#fff0f0;color:var(--bad)} .tag.t1{background:#fff4e6;color:var(--warn)}
.tag.t2{background:#e6fcf5;color:#0b7285} .tag.t3{background:#f1f3f5;color:var(--muted)}
.typecard{cursor:pointer;transition:transform .06s}
.typecard:hover{transform:translateY(-2px);border-color:var(--brand)}
.typecard .code{font-size:18px;font-weight:800}
.bar{height:10px;background:#edf0f7;border-radius:6px;overflow:hidden;position:relative}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2))}
.bar .target{position:absolute;top:-3px;width:2px;height:16px;background:var(--bad)}
.skillrow{display:grid;grid-template-columns:88px 1fr 92px;gap:10px;align-items:center;margin:8px 0}
.timer{font-variant-numeric:tabular-nums;font-weight:800;font-size:22px;color:var(--brand)}
.timer.low{color:var(--bad)}
.phase{font-size:12px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.stimulus{font-size:17px;line-height:1.75;margin:10px 0}
.stimulus svg{max-width:100%;height:auto;border:1px solid var(--line);border-radius:10px;background:#fff}
textarea{width:100%;min-height:140px;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:15px;font-family:inherit;line-height:1.6}
select,input[type=text],input[type=number],input[type=date]{border:1px solid var(--line);border-radius:8px;padding:6px 9px;font-size:14px;font-family:inherit}
.opt{display:flex;gap:9px;align-items:flex-start;border:1px solid var(--line);border-radius:10px;padding:10px;margin:6px 0;cursor:pointer}
.opt:hover{border-color:var(--brand)} .opt.sel{border-color:var(--brand);background:var(--chip)}
.opt.correct{border-color:var(--ok);background:#ebfbee} .opt.wrong{border-color:var(--bad);background:#fff5f5}
.word{cursor:pointer;padding:1px 3px;border-radius:4px}
.word:hover{background:var(--chip)} .word.mark{background:#ffe066}
.word.hit{background:#b2f2bb} .word.miss{background:#ffc9c9;text-decoration:line-through}
.word.shouldhave{outline:2px dashed var(--warn)}
.blankslot{display:inline-block;min-width:110px;border-bottom:2px solid var(--brand);text-align:center;cursor:pointer;font-weight:700;color:var(--brand);padding:0 4px}
.blankslot.active{background:var(--chip)}
.bankword{display:inline-block;border:1px solid var(--line);border-radius:8px;padding:4px 10px;margin:4px;cursor:pointer;font-weight:600}
.bankword.used{opacity:.35;pointer-events:none}
.para{border:1px solid var(--line);border-radius:10px;padding:10px;margin:6px 0;background:#fff;display:flex;gap:8px;align-items:flex-start}
.para .mv{display:flex;flex-direction:column;gap:4px}
.para .mv button{border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;padding:2px 8px}
.diffok{color:var(--ok);font-weight:600} .diffbad{color:var(--bad);font-weight:700;text-decoration:underline}
.scorebox{font-size:26px;font-weight:800;color:var(--brand)}
.kwchip{display:inline-block;border:1px solid var(--line);border-radius:14px;padding:3px 10px;margin:3px;font-size:13px;cursor:pointer}
.kwchip.on{background:#ebfbee;border-color:var(--ok);color:var(--ok);font-weight:700}
.slider-row{display:grid;grid-template-columns:110px 1fr 34px;gap:10px;align-items:center;margin:4px 0}
table.tbl{width:100%;border-collapse:collapse;font-size:14px}
table.tbl th,table.tbl td{border-bottom:1px solid var(--line);padding:7px 6px;text-align:left}
.right{text-align:right}
.speaker-label{font-weight:800;color:var(--brand2);font-size:20px;margin:8px 0}
.rec-dot{display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--bad);animation:blink 1s infinite;margin-right:6px}
@keyframes blink{50%{opacity:.25}}
.footer-note{color:var(--muted);font-size:12px;text-align:center;padding:14px}
.flex{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.spread{justify-content:space-between}
.template{background:#f8f9fe;border:1px dashed var(--line);border-radius:10px;padding:10px;margin:8px 0;font-size:14px;line-height:1.7}
.pill{border-radius:999px;border:1px solid var(--line);padding:3px 12px;font-size:13px;font-weight:600;cursor:pointer}
.pill.on{background:var(--brand);color:#fff;border-color:var(--brand)}
</style>
</head>
<body>
<header>
  <span class="logo">PTE·MARA</span>
  <nav id="nav">
    <a href="#home">首页</a>
    <a href="#practice">练习</a>
    <a href="#memory">记忆库</a>
    <a href="#learn">学习</a>
    <a href="#stats">统计</a>
    <a href="#settings">设置</a>
  </nav>
  <span id="streak" class="muted small" style="margin-left:auto"></span>
</header>
<main id="app"></main>
<div class="footer-note">目标（OMARA·LIN 26/002）：S 66 · L 53 · R 54 · W 60 · Overall 63 ｜ 数据仅存本机浏览器</div>
<script src="bank.js"></script>
<script src="app.js"></script>
<script>if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0) { navigator.serviceWorker.register("sw.js"); }</script>
</body>
</html>
